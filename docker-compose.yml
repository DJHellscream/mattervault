# D:\CCC\docker-compose.yml
services:
  claude-client:
    build: .
    container_name: claude-god-mode
    tty: true
    stdin_open: true
    
    # Port 3005 is strictly for "Quick Tests" (e.g. if Claude runs 'node server.js' 
    # directly in the terminal before building the final dashboard container).
    ports:
      - "3005:3000"
      
    volumes:
      # 1. THE STUDIO ROOT: Gives Claude access to /dashboard AND /mattervault
      - D:\CCC:/workspace
      
      # 2. THE BRAIN: Persists your login and chat history
      - claude_config:/root/.claude
      
      # 3. GOD MODE: Gives Claude control over your Windows Docker Engine
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - default
      - matter_bridge

volumes:
  claude_config:

networks:
  default:
  matter_bridge:
    external: true
    # Make sure this matches your existing Mattervault network name exactly
    name: mattervault_matternet