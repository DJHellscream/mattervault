services:
  claude-client:
    build: .
    container_name: claude-orchestrator
    tty: true
    stdin_open: true

    ports:
      - "3005:3000"  # Expose the dashboard port

    volumes:
      # 1. YOUR CODE (Maps to Windows D:\CCC)
      - D:\CCC:/workspace

      # 2. YOUR CLAUDE BRAIN (Persists login, history, plugins)
      - claude_config:/root/.claude

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - default
      - matter_bridge

# Define the volume name here
volumes:
  claude_config:

networks:
  default:
  matter_bridge:
    external: true
    name: mattervault_matternet
