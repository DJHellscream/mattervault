<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Library - Mattervault Admin</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Override body overflow for admin page */
    body {
      overflow: auto;
    }

    /* Page layout */
    .prompts-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .prompts-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      animation: fadeSlideDown 0.5s ease-out;
    }

    .prompts-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .prompts-title .brand-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .prompts-title h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .prompts-title .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent-teal);
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.2);
      padding: 4px 10px;
      border-radius: 6px;
      width: fit-content;
      margin-top: 8px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      background: rgba(0, 0, 0, 0.5);
      color: var(--text-primary);
      border-color: var(--border-glow);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: var(--accent-teal);
      color: var(--bg-deep);
    }

    .btn-primary:hover {
      background: #00e6b8;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.5);
      color: var(--text-primary);
    }

    .btn-danger {
      background: rgba(255, 92, 114, 0.1);
      border: 1px solid rgba(255, 92, 114, 0.2);
      color: var(--accent-error);
      padding: 6px 10px;
      font-size: 0.8rem;
    }

    .btn-danger:hover {
      background: rgba(255, 92, 114, 0.2);
      border-color: rgba(255, 92, 114, 0.4);
    }

    /* Prompt list */
    .prompt-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeSlideUp 0.5s ease-out 0.1s backwards;
    }

    .prompt-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 16px 20px;
      transition: all 0.2s ease;
    }

    .prompt-card:hover {
      border-color: var(--border-glow);
    }

    .prompt-card.disabled {
      opacity: 0.55;
    }

    .drag-handle {
      cursor: grab;
      color: var(--text-muted);
      font-size: 1.2rem;
      padding: 4px;
      user-select: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .prompt-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.2);
      border-radius: 10px;
      color: var(--accent-teal);
    }

    .prompt-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .prompt-info-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt-info h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .default-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent-blue);
      background: rgba(77, 166, 255, 0.1);
      border: 1px solid rgba(77, 166, 255, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .prompt-info p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prompt-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(100, 120, 160, 0.3);
      border-radius: 24px;
      transition: all 0.3s ease;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: var(--text-secondary);
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: rgba(0, 212, 170, 0.4);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
      background: var(--accent-teal);
    }

    .edit-btn, .delete-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .edit-btn:hover {
      background: rgba(77, 166, 255, 0.1);
      border-color: rgba(77, 166, 255, 0.3);
      color: var(--accent-blue);
    }

    .delete-btn:hover {
      background: rgba(255, 92, 114, 0.1);
      border-color: rgba(255, 92, 114, 0.3);
      color: var(--accent-error);
    }

    /* Sortable ghost */
    .sortable-ghost {
      opacity: 0.5;
      background: rgba(0, 212, 170, 0.05);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state svg {
      opacity: 0.4;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .prompt-modal {
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: modalAppear 0.3s ease-out;
    }

    @keyframes modalAppear {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .modal-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: rgba(255, 92, 114, 0.1);
      border-color: rgba(255, 92, 114, 0.3);
      color: var(--accent-error);
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(77, 166, 255, 0.1);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-muted);
    }

    /* Icon picker */
    .icon-picker {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .icon-option {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid var(--border-subtle);
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .icon-option:hover {
      border-color: var(--border-glow);
      color: var(--text-primary);
    }

    .icon-option.selected {
      border-color: var(--accent-teal);
      background: rgba(0, 212, 170, 0.1);
      color: var(--accent-teal);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
    }

    /* Loading */
    .loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10, 14, 26, 0.8);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-subtle);
      border-top-color: var(--accent-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Access denied */
    .access-denied {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      animation: fadeSlideUp 0.5s ease-out;
    }

    .access-denied svg {
      color: var(--accent-error);
      opacity: 0.6;
      margin-bottom: 24px;
    }

    .access-denied h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .access-denied p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .prompts-page {
        padding: 24px 16px;
      }

      .prompts-header {
        flex-direction: column;
        gap: 16px;
      }

      .header-actions {
        width: 100%;
      }

      .back-link, .btn-primary {
        flex: 1;
        justify-content: center;
      }

      .prompt-card {
        flex-wrap: wrap;
        gap: 12px;
      }

      .prompt-info {
        min-width: calc(100% - 80px);
        order: -1;
        flex-basis: calc(100% - 80px);
      }

      .drag-handle {
        order: -2;
      }

      .prompt-actions {
        width: 100%;
        justify-content: flex-end;
        padding-top: 8px;
        border-top: 1px solid var(--border-subtle);
      }

      .icon-picker {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 480px) {
      .prompt-modal {
        max-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="prompts-page" id="promptsPage">
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <!-- Access denied state -->
    <div class="access-denied" id="accessDenied" style="display: none;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      </svg>
      <h2>Access Denied</h2>
      <p>You need administrator privileges to manage the prompt library.</p>
      <a href="/" class="btn btn-primary">Return to Chat</a>
    </div>

    <!-- Main content -->
    <div id="mainContent" style="display: none;">
      <header class="prompts-header">
        <div class="prompts-title">
          <div class="brand-label">Mattervault Admin</div>
          <h1>Prompt Library</h1>
          <div class="admin-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>Admin Access</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary" id="addNewBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add New
          </button>
          <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Chat
          </a>
        </div>
      </header>

      <div class="prompt-list" id="promptList">
        <!-- Populated by JS -->
      </div>

      <div class="empty-state" id="emptyState" style="display: none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <p>No quick actions configured yet. Click "Add New" to create one.</p>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="promptModal">
    <div class="prompt-modal">
      <div class="modal-header">
        <h3 id="modalTitle">New Quick Action</h3>
        <button class="modal-close" id="closeModalBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="fieldTitle" placeholder="e.g., Summarize Document" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="fieldDescription" placeholder="e.g., Generate a concise summary of the selected document">
        </div>
        <div class="form-group">
          <label>Icon</label>
          <div class="icon-picker" id="iconPicker">
            <!-- Populated by JS -->
          </div>
        </div>
        <div class="form-group">
          <label>Prompt Text *</label>
          <textarea id="fieldPromptText" rows="4" placeholder="e.g., Please provide a comprehensive summary of this document, including key dates, parties involved, and important terms."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
        <button class="btn btn-primary" id="saveModalBtn">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script>
    // Icon map
    const QA_ICONS = {
      'file-text': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>',
      'alert-triangle': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      'list': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>',
      'clock': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      'users': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      'search': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
      'shield': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
      'bookmark': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
      'scale': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="3" x2="12" y2="21"/><path d="M17 8l-5-5-5 5"/><path d="M3 18h18"/></svg>',
      'folder': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
      'edit': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
      'zap': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
    };

    // State
    let accessToken = null;
    let currentUser = null;
    let prompts = [];
    let editingId = null;
    let selectedIcon = 'file-text';
    let sortableInstance = null;

    // Elements
    const loadingOverlay = document.getElementById('loadingOverlay');
    const accessDenied = document.getElementById('accessDenied');
    const mainContent = document.getElementById('mainContent');
    const promptList = document.getElementById('promptList');
    const emptyState = document.getElementById('emptyState');
    const promptModal = document.getElementById('promptModal');
    const modalTitle = document.getElementById('modalTitle');
    const fieldTitle = document.getElementById('fieldTitle');
    const fieldDescription = document.getElementById('fieldDescription');
    const fieldPromptText = document.getElementById('fieldPromptText');
    const iconPicker = document.getElementById('iconPicker');

    // Initialize
    async function init() {
      accessToken = localStorage.getItem('accessToken') || sessionStorage.getItem('accessToken');
      const userStr = localStorage.getItem('user') || sessionStorage.getItem('user');

      if (!accessToken || !userStr) {
        window.location.href = '/login.html';
        return;
      }

      currentUser = JSON.parse(userStr);

      if (currentUser.role !== 'admin') {
        loadingOverlay.classList.remove('active');
        accessDenied.style.display = 'flex';
        return;
      }

      mainContent.style.display = 'block';
      buildIconPicker();
      await loadPrompts();
      loadingOverlay.classList.remove('active');
    }

    // API helper
    async function api(endpoint, options = {}) {
      const res = await fetch(endpoint, {
        ...options,
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
          ...options.headers
        }
      });

      if (res.status === 401) {
        window.location.href = '/login.html';
        return null;
      }

      if (res.status === 403) {
        accessDenied.style.display = 'flex';
        mainContent.style.display = 'none';
        return null;
      }

      return res;
    }

    // Load prompts
    async function loadPrompts() {
      try {
        const res = await api('/api/prompts');
        if (!res) return;

        const data = await res.json();
        prompts = data.prompts || data;
        renderPrompts();
      } catch (err) {
        console.error('Failed to load prompts:', err);
      }
    }

    // Render prompt list
    function renderPrompts() {
      if (prompts.length === 0) {
        promptList.innerHTML = '';
        emptyState.style.display = 'flex';
        return;
      }

      emptyState.style.display = 'none';

      promptList.innerHTML = prompts.map(p => {
        const iconSvg = QA_ICONS[p.icon] || QA_ICONS['file-text'];
        const isDefault = p.is_default;
        const isEnabled = p.enabled !== false;

        return `
          <div class="prompt-card ${isEnabled ? '' : 'disabled'}" data-id="${p.id}">
            <div class="drag-handle" title="Drag to reorder">&#8801;</div>
            <div class="prompt-icon">${iconSvg}</div>
            <div class="prompt-info">
              <div class="prompt-info-header">
                <h3>${escapeHtml(p.title)}</h3>
                ${isDefault ? '<span class="default-badge">Default</span>' : ''}
              </div>
              ${p.description ? `<p>${escapeHtml(p.description)}</p>` : ''}
            </div>
            <div class="prompt-actions">
              <label class="toggle-switch" title="${isEnabled ? 'Enabled' : 'Disabled'}">
                <input type="checkbox" ${isEnabled ? 'checked' : ''} onchange="toggleEnabled('${p.id}', this.checked)">
                <span class="toggle-slider"></span>
              </label>
              <button class="edit-btn" title="Edit" onclick="openEditModal('${p.id}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              ${!isDefault ? `
                <button class="delete-btn" title="Delete" onclick="deletePrompt('${p.id}')">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                  </svg>
                </button>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');

      initSortable();
    }

    // Build icon picker
    function buildIconPicker() {
      iconPicker.innerHTML = Object.entries(QA_ICONS).map(([name, svg]) => `
        <button type="button" class="icon-option ${name === selectedIcon ? 'selected' : ''}" data-icon="${name}" title="${name}" onclick="selectIcon('${name}')">
          ${svg}
        </button>
      `).join('');
    }

    // Select icon
    function selectIcon(name) {
      selectedIcon = name;
      document.querySelectorAll('.icon-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.icon === name);
      });
    }

    // Init SortableJS
    function initSortable() {
      if (sortableInstance) {
        sortableInstance.destroy();
      }

      sortableInstance = new Sortable(promptList, {
        handle: '.drag-handle',
        ghostClass: 'sortable-ghost',
        animation: 150,
        onEnd: async function() {
          const cards = promptList.querySelectorAll('.prompt-card');
          const order = Array.from(cards).map((card, index) => ({
            id: card.dataset.id,
            sort_order: index
          }));

          try {
            await api('/api/prompts/reorder', {
              method: 'PATCH',
              body: JSON.stringify({ order })
            });
          } catch (err) {
            console.error('Failed to reorder:', err);
            await loadPrompts();
          }
        }
      });
    }

    // Toggle enabled
    async function toggleEnabled(id, enabled) {
      try {
        const prompt = prompts.find(p => p.id === id);
        if (!prompt) return;

        await api(`/api/prompts/${id}`, {
          method: 'PUT',
          body: JSON.stringify({
            title: prompt.title,
            description: prompt.description,
            icon: prompt.icon,
            prompt_text: prompt.prompt_text,
            enabled: enabled
          })
        });

        prompt.enabled = enabled;
        const card = promptList.querySelector(`[data-id="${id}"]`);
        if (card) {
          card.classList.toggle('disabled', !enabled);
        }
      } catch (err) {
        console.error('Failed to toggle:', err);
        await loadPrompts();
      }
    }

    // Open create modal
    function openCreateModal() {
      editingId = null;
      modalTitle.textContent = 'New Quick Action';
      fieldTitle.value = '';
      fieldDescription.value = '';
      fieldPromptText.value = '';
      selectedIcon = 'file-text';
      buildIconPicker();
      promptModal.classList.add('active');
      fieldTitle.focus();
    }

    // Open edit modal
    function openEditModal(id) {
      const prompt = prompts.find(p => p.id === id);
      if (!prompt) return;

      editingId = id;
      modalTitle.textContent = 'Edit Quick Action';
      fieldTitle.value = prompt.title;
      fieldDescription.value = prompt.description || '';
      fieldPromptText.value = prompt.prompt_text || '';
      selectedIcon = prompt.icon || 'file-text';
      buildIconPicker();
      promptModal.classList.add('active');
      fieldTitle.focus();
    }

    // Save prompt
    async function savePrompt() {
      const title = fieldTitle.value.trim();
      const prompt_text = fieldPromptText.value.trim();

      if (!title) {
        fieldTitle.focus();
        return;
      }
      if (!prompt_text) {
        fieldPromptText.focus();
        return;
      }

      const payload = {
        title,
        description: fieldDescription.value.trim(),
        icon: selectedIcon,
        prompt_text,
        enabled: true
      };

      try {
        if (editingId) {
          const existing = prompts.find(p => p.id === editingId);
          if (existing) {
            payload.enabled = existing.enabled !== false;
          }
          await api(`/api/prompts/${editingId}`, {
            method: 'PUT',
            body: JSON.stringify(payload)
          });
        } else {
          await api('/api/prompts', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
        }

        promptModal.classList.remove('active');
        await loadPrompts();
      } catch (err) {
        console.error('Failed to save prompt:', err);
      }
    }

    // Delete prompt
    async function deletePrompt(id) {
      const prompt = prompts.find(p => p.id === id);
      if (!prompt) return;

      if (!confirm(`Delete "${prompt.title}"? This cannot be undone.`)) return;

      try {
        const res = await api(`/api/prompts/${id}`, { method: 'DELETE' });
        if (res && res.ok) {
          await loadPrompts();
        }
      } catch (err) {
        console.error('Failed to delete:', err);
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    document.getElementById('addNewBtn').addEventListener('click', openCreateModal);
    document.getElementById('closeModalBtn').addEventListener('click', () => {
      promptModal.classList.remove('active');
    });
    document.getElementById('cancelModalBtn').addEventListener('click', () => {
      promptModal.classList.remove('active');
    });
    document.getElementById('saveModalBtn').addEventListener('click', savePrompt);

    promptModal.addEventListener('click', (e) => {
      if (e.target === promptModal) {
        promptModal.classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && promptModal.classList.contains('active')) {
        promptModal.classList.remove('active');
      }
    });

    // Start
    init();
  </script>
</body>
</html>
