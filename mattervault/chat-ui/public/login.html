<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mattervault</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .auth-container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      animation: fadeSlideUp 0.6s ease-out;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header .brand-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .auth-header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(77, 166, 255, 0.1);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .auth-btn {
      width: 100%;
      background: var(--accent-teal);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--bg-deep);
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .auth-btn:hover:not(:disabled) {
      background: #00e6b8;
      transform: translateY(-1px);
    }

/* Glowing Loading State for Button */
.auth-btn:disabled {
  /* Maintains the teal theme instead of turning gray */
  background: var(--accent-teal);
  cursor: wait;
  opacity: 0.85;
  /* Adds the signature glow effect during processing */
  box-shadow: 0 0 20px var(--accent-teal-glow);
  transform: scale(0.98);
}

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-subtle);
    }

    .auth-footer p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--accent-teal);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .auth-footer a:hover {
      color: #00e6b8;
    }

    .error-message {
      background: rgba(255, 92, 114, 0.1);
      border: 1px solid rgba(255, 92, 114, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: var(--accent-error);
      font-size: 0.9rem;
      display: none;
    }

    .error-message.visible {
      display: block;
      animation: fadeSlideDown 0.3s ease-out;
    }

/* Enhanced Loading Spinner */
.loading-spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  /* Uses a semi-transparent track for a more refined look */
  border: 2px solid rgba(10, 14, 26, 0.1); 
  border-top-color: var(--bg-deep); /* Contrast against the teal button */
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 10px;
  vertical-align: middle;
}

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

/* Animated Custom Checkbox */
.remember-me label {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-secondary);
  user-select: none;
}

.remember-me input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid var(--border-subtle);
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  transition: all 0.2s ease;
  flex-shrink: 0;
  /* Grid centering ensures the check is perfectly dead-center */
  display: grid;
  place-content: center;
}

.remember-me input[type="checkbox"]:hover {
  border-color: var(--accent-blue);
  background: rgba(0, 0, 0, 0.6);
}

.remember-me input[type="checkbox"]:checked {
  background: rgba(0, 212, 170, 0.1);
  border-color: var(--accent-teal);
  box-shadow: 0 0 12px var(--accent-teal-glow);
}

/* The Proportional Checkmark with Pop Animation */
.remember-me input[type="checkbox"]::after {
  content: "";
  width: 10px;
  height: 6px;
  border: solid var(--accent-teal);
  border-width: 0 0 2.5px 2.5px;
  /* Combined rotation, optical centering, and initial hidden scale */
  transform: translateY(-1px) rotate(-45deg) scale(0);
  opacity: 0;
  /* Cubic-bezier provides the "snappy" pop effect */
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.1s ease;
}

.remember-me input[type="checkbox"]:checked::after {
  opacity: 1;
  /* Scales up to full size when checked */
  transform: translateY(-1px) rotate(-45deg) scale(1);
}
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-label">Document Intelligence</div>
        <h1>mattervault</h1>
        <p>Sign in with your Paperless account</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your Paperless username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <div class="form-group remember-me">
          <label>
            <input type="checkbox" id="rememberMe" name="rememberMe">
            Keep me signed in
          </label>
        </div>

        <button type="submit" class="auth-btn" id="submitBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    // Check if already logged in (check both storage locations)
    const accessToken = localStorage.getItem('accessToken') || sessionStorage.getItem('accessToken');
    if (accessToken) {
      window.location.href = '/';
    }

    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      // Hide previous errors
      errorMessage.classList.remove('visible');

      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading-spinner"></span>Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, rememberMe }),
          credentials: 'include' // Include cookies
        });

        const data = await res.json();

        if (res.ok) {
          // Store access token - localStorage if rememberMe, sessionStorage otherwise
          const storage = rememberMe ? localStorage : sessionStorage;
          storage.setItem('accessToken', data.accessToken);
          storage.setItem('user', JSON.stringify(data.user));

          // Redirect to main app
          window.location.href = '/';
        } else {
          // Show error
          errorMessage.textContent = data.error || 'Login failed';
          errorMessage.classList.add('visible');
        }
      } catch (err) {
        errorMessage.textContent = 'Network error. Please try again.';
        errorMessage.classList.add('visible');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
