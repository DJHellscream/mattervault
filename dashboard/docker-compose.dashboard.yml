services:
  health-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: mattervault-dashboard
    ports:
      - "3006:3000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - mattervault_matternet

networks:
  mattervault_matternet:
    external: true
